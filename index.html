<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="google-adsense-account" content="ca-pub-1194290959028721">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clicknator</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #0f172a;
      color: white;
    }

    .sidebar {
      width: 200px;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 42px;
      color: #38bdf8;
    }

    #stats {
      font-size: 16px;
      margin-bottom: 20px;
      color: #94a3b8;
    }

    #counter {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #fbbf24;
    }

    /* Botão Principal */
    .btn-main {
      padding: 20px 50px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 8px 0 #16a34a;
    }

    .btn-main:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 #16a34a;
    }

    /* Painel de Upgrades */
    .upgrades {
      margin-top: 40px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-upgrade {
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-upgrade:hover {
      background: #2563eb;
    }

    .btn-upgrade:disabled {
      background: #475569;
      color: #94a3b8;
      cursor: not-allowed;
    }

    @media (max-width: 900px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXX"
         data-ad-slot="1111111111"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

  <div class="main">
    <h1>Clicknator</h1>
    <div id="stats">Poder do Clique: 1 | Auto-Clicks: 0/s</div>
    <div id="counter">Clicks: 0</div>
    
    <button class="btn-main" onclick="clickButton()">CLICK!</button>

    <div class="upgrades">
      <button class="btn-upgrade" id="btn-power" onclick="buyPower()">
        💪 Mais Força (+1/click)<br><small>Custo: 10 Clicks</small>
      </button>
      <button class="btn-upgrade" id="btn-auto" onclick="buyAuto()">
        🤖 Auto-Clicker (+1/seg)<br><small>Custo: 50 Clicks</small>
      </button>
    </div>
  </div>

  <div class="sidebar">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXX"
         data-ad-slot="2222222222"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

  <script>
    // Variáveis do jogo
    let clicks = 0;
    let clickPower = 1;
    let autoClicks = 0;

    // Custos dos upgrades
    let costPower = 10;
    let costAuto = 50;

    // Função para atualizar a tela com os valores atuais
    function updateDisplay() {
      document.getElementById("counter").innerText = "Clicks: " + Math.floor(clicks);
      document.getElementById("stats").innerText = `Poder do Clique: ${clickPower} | Auto-Clicks: ${autoClicks}/s`;
      
      // Atualiza textos dos botões de upgrade
      document.getElementById("btn-power").innerHTML = `💪 Mais Força (+1/click)<br><small>Custo: ${costPower} Clicks</small>`;
      document.getElementById("btn-auto").innerHTML = `🤖 Auto-Clicker (+1/seg)<br><small>Custo: ${costAuto} Clicks</small>`;

      // Desabilita os botões se o jogador não tiver cliques suficientes
      document.getElementById("btn-power").disabled = clicks < costPower;
      document.getElementById("btn-auto").disabled = clicks < costAuto;
    }

    // Clique principal
    function clickButton() {
      clicks += clickPower;
      updateDisplay();
    }

    // Comprar Upgrade de Força
    function buyPower() {
      if (clicks >= costPower) {
        clicks -= costPower; // Paga o custo
        clickPower += 1; // Aumenta o poder
        costPower = Math.floor(costPower * 1.5); // Aumenta o custo para a próxima vez (50% mais caro)
        updateDisplay();
      }
    }

    // Comprar Upgrade de Auto-Clicker
    function buyAuto() {
      if (clicks >= costAuto) {
        clicks -= costAuto; // Paga o custo
        autoClicks += 1; // Aumenta os cliques automáticos
        costAuto = Math.floor(costAuto * 1.5); // Aumenta o custo para a próxima vez
        updateDisplay();
      }
    }

    // Loop do Auto-Clicker (Roda a cada 1000 milissegundos = 1 segundo)
    setInterval(function() {
      if (autoClicks > 0) {
        clicks += autoClicks;
        updateDisplay();
      }
    }, 1000);

    // Chama a função uma vez no início para ajustar os botões
    updateDisplay();

    // Inicializa anúncios
    try {
      (adsbygoogle = window.adsbygoogle || []).push({});
      (adsbygoogle = window.adsbygoogle || []).push({});
    } catch(e) {
      console.log("Erro no AdSense (normal ao rodar localmente)");
    }
  </script>

</body>
</html>
